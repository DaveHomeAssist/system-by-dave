  <text x="232" y="196" font-family="'DM Mono','Courier New',monospace" font-size="13" font-weight="500" fill="#c0623a" letter-spacing="5" style="fill:rgb(192, 98, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Mono&quot;, &quot;Courier New&quot;, monospace;font-size:13px;font-weight:500;text-anchor:start;dominant-baseline:auto">BY DAVE</text>

  <!-- Bottom rule -->
  <line x1="40" y1="248" x2="640" y2="248" stroke="#d8d2c8" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(216, 210, 200);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="40" y="268" font-family="'DM Mono','Courier New',monospace" font-size="11" font-weight="400" fill="#b0a99f" letter-spacing="3" style="fill:rgb(176, 169, 159);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Mono&quot;, &quot;Courier New&quot;, monospace;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">NOTION TEMPLATES  ·  PERSONAL OS  ·  FREELANCE TOOLS</text>
