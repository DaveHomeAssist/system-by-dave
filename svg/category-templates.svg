<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <pattern id="tp-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#B5654A" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#F5F0E8"/>
  <rect width="200" height="200" fill="url(#tp-grid)"/>

  <!-- Main template document -->
  <g transform="translate(50, 36)">
    <!-- Page shadow -->
    <rect x="6" y="6" width="94" height="126" rx="2" fill="#2C2C2C" opacity="0.04"/>
    <!-- Page -->
    <rect x="0" y="0" width="94" height="126" rx="2" fill="#F5F0E8" stroke="#2C2C2C" stroke-width="1.2" opacity="0.5"/>
    <!-- Dog-ear -->
    <path d="M70 0 L94 0 L94 24" fill="none" stroke="#2C2C2C" stroke-width="0.8" opacity="0.2"/>
    <path d="M70 0 L70 24 L94 24" fill="#EDE7DB" stroke="#2C2C2C" stroke-width="0.8" opacity="0.2"/>

    <!-- Title block -->
    <rect x="12" y="16" width="48" height="5" rx="1.5" fill="#2C2C2C" opacity="0.35"/>
    <rect x="12" y="26" width="32" height="3" rx="1" fill="#B5654A" opacity="0.25"/>

    <!-- Divider -->
    <line x1="12" y1="36" x2="82" y2="36" stroke="#B5654A" stroke-width="0.6" opacity="0.25"/>

    <!-- Content sections with template variable markers -->
    <!-- Section 1 -->
    <rect x="12" y="42" width="70" height="3" rx="1" fill="#2C2C2C" opacity="0.12"/>
    <rect x="12" y="49" width="56" height="3" rx="1" fill="#2C2C2C" opacity="0.1"/>
    <rect x="12" y="56" width="64" height="3" rx="1" fill="#2C2C2C" opacity="0.1"/>

    <!-- Template variable slot 1 -->
    <rect x="12" y="66" width="40" height="12" rx="2" fill="#B5654A" opacity="0.08"/>
    <rect x="12" y="66" width="40" height="12" rx="2" fill="none" stroke="#B5654A" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.35"/>
    <text x="18" y="75" font-family="monospace" font-size="7" fill="#B5654A" opacity="0.5">{{variable}}</text>

    <!-- Section 2 -->
    <rect x="12" y="86" width="62" height="3" rx="1" fill="#2C2C2C" opacity="0.12"/>
    <rect x="12" y="93" width="48" height="3" rx="1" fill="#2C2C2C" opacity="0.1"/>

    <!-- Template variable slot 2 -->
    <rect x="12" y="102" width="52" height="12" rx="2" fill="#B5654A" opacity="0.08"/>
    <rect x="12" y="102" width="52" height="12" rx="2" fill="none" stroke="#B5654A" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.35"/>
    <text x="18" y="111" font-family="monospace" font-size="7" fill="#B5654A" opacity="0.5">{{content_block}}</text>
  </g>

  <!-- Duplicate pages stacked behind (showing it's a template that creates copies) -->
  <g opacity="0.25">
    <rect x="58" y="42" width="94" height="126" rx="2" fill="none" stroke="#2C2C2C" stroke-width="0.8"/>
  </g>
  <g opacity="0.12">
    <rect x="64" y="48" width="94" height="126" rx="2" fill="none" stroke="#2C2C2C" stroke-width="0.8"/>
  </g>

  <!-- Stamp / badge -->
  <g transform="translate(136, 28)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#B5654A" stroke-width="1.2" opacity="0.35"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#B5654A" stroke-width="0.5" opacity="0.2"/>
    <text x="0" y="2" font-family="Georgia, serif" font-size="8" fill="#B5654A" opacity="0.5" text-anchor="middle" letter-spacing="0.06em">SBD</text>
    <text x="0" y="10" font-family="monospace" font-size="5" fill="#B5654A" opacity="0.35" text-anchor="middle">TEMPLATE</text>
  </g>

  <!-- Arrow suggesting duplication -->
  <g transform="translate(100, 170)">
    <path d="M0 0 Q20 -8 40 0" fill="none" stroke="#B5654A" stroke-width="1" opacity="0.3"/>
    <polygon points="38,-3 44,0 38,3" fill="#B5654A" opacity="0.3"/>
    <text x="20" y="14" font-family="monospace" font-size="7" fill="#2C2C2C" opacity="0.25" text-anchor="middle">duplicate</text>
  </g>

  <!-- Label -->
  <text x="16" y="24" font-family="Georgia, serif" font-size="11" fill="#2C2C2C" opacity="0.5" letter-spacing="0.08em">TEMPLATES</text>
  <line x1="16" y1="30" x2="80" y2="30" stroke="#B5654A" stroke-width="0.8" opacity="0.3"/>
</svg>