  <text x="230" y="158" font-family="'Syne','Arial Black',sans-serif" font-size="64" font-weight="800" fill="#e8dece" letter-spacing="-1" style="fill:rgb(232, 222, 206);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, &quot;Arial Black&quot;, sans-serif;font-size:64px;font-weight:800;text-anchor:start;dominant-baseline:auto">SYSTEM</text>

  <!-- BY DAVE — rust, mono -->
  <text x="232" y="196" font-family="'DM Mono','Courier New',monospace" font-size="13" font-weight="500" fill="#c0623a" letter-spacing="5" style="fill:rgb(192, 98, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Mono&quot;, &quot;Courier New&quot;, monospace;font-size:13px;font-weight:500;text-anchor:start;dominant-baseline:auto">BY DAVE</text>

  <!-- Bottom rule -->
  <line x1="40" y1="248" x2="640" y2="248" stroke="#2a2623" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(42, 38, 35);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="40" y="268" font-family="'DM Mono','Courier New',monospace" font-size="11" font-weight="400" fill="#4a4440" letter-spacing="3" style="fill:rgb(74, 68, 64);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Mono&quot;, &quot;Courier New&quot;, monospace;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">NOTION TEMPLATES  ·  PERSONAL OS  ·  FREELANCE TOOLS</text>
