<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="300" fill="#1c1917" style="fill:rgb(28, 25, 23);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

