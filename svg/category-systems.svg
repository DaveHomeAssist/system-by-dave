<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <pattern id="sy-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#B5654A" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#F5F0E8"/>
  <rect width="200" height="200" fill="url(#sy-grid)"/>

  <!-- Central hub -->
  <circle cx="100" cy="100" r="24" fill="#2C2C2C" opacity="0.04"/>
  <circle cx="100" cy="100" r="24" fill="none" stroke="#2C2C2C" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="16" fill="#2C2C2C" opacity="0.06"/>
  <circle cx="100" cy="100" r="16" fill="none" stroke="#B5654A" stroke-width="0.8" opacity="0.3"/>
  <!-- Gear teeth on central hub -->
  <g stroke="#2C2C2C" stroke-width="1.5" opacity="0.25">
    <line x1="100" y1="74" x2="100" y2="68"/>
    <line x1="100" y1="126" x2="100" y2="132"/>
    <line x1="74" y1="100" x2="68" y2="100"/>
    <line x1="126" y1="100" x2="132" y2="100"/>
    <line x1="83" y1="83" x2="79" y2="79"/>
    <line x1="117" y1="83" x2="121" y2="79"/>
    <line x1="83" y1="117" x2="79" y2="121"/>
    <line x1="117" y1="117" x2="121" y2="121"/>
  </g>
  <!-- Center icon -->
  <text x="100" y="104" font-family="Georgia, serif" font-size="16" fill="#2C2C2C" opacity="0.4" text-anchor="middle">S</text>

  <!-- Database node: top-left -->
  <g transform="translate(24, 28)">
    <rect width="44" height="36" rx="3" fill="#F5F0E8" stroke="#2C2C2C" stroke-width="1" opacity="0.4"/>
    <!-- DB rows -->
    <line x1="0" y1="12" x2="44" y2="12" stroke="#2C2C2C" stroke-width="0.6" opacity="0.2"/>
    <line x1="0" y1="24" x2="44" y2="24" stroke="#2C2C2C" stroke-width="0.6" opacity="0.2"/>
    <!-- Col divider -->
    <line x1="16" y1="0" x2="16" y2="36" stroke="#2C2C2C" stroke-width="0.4" opacity="0.12"/>
    <!-- Data -->
    <rect x="4" y="4" width="8" height="4" rx="1" fill="#B5654A" opacity="0.25"/>
    <rect x="20" y="4" width="16" height="4" rx="1" fill="#2C2C2C" opacity="0.12"/>
    <rect x="4" y="16" width="8" height="4" rx="1" fill="#B5654A" opacity="0.18"/>
    <rect x="20" y="16" width="12" height="4" rx="1" fill="#2C2C2C" opacity="0.1"/>
    <rect x="4" y="28" width="8" height="4" rx="1" fill="#B5654A" opacity="0.12"/>
    <rect x="20" y="28" width="18" height="4" rx="1" fill="#2C2C2C" opacity="0.08"/>
  </g>
  <!-- Connection line to hub -->
  <path d="M68 56 Q82 72 88 84" stroke="#B5654A" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <circle cx="68" cy="56" r="2" fill="#B5654A" opacity="0.4"/>

  <!-- Automation node: top-right -->
  <g transform="translate(136, 30)">
    <rect width="40" height="32" rx="3" fill="#F5F0E8" stroke="#B5654A" stroke-width="1" opacity="0.35"/>
    <!-- Lightning bolt -->
    <path d="M20 6 L14 18 L22 16 L16 28" stroke="#B5654A" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Trigger lines -->
    <line x1="6" y1="10" x2="12" y2="10" stroke="#2C2C2C" stroke-width="0.8" opacity="0.2"/>
    <line x1="6" y1="16" x2="10" y2="16" stroke="#2C2C2C" stroke-width="0.8" opacity="0.15"/>
    <line x1="26" y1="10" x2="34" y2="10" stroke="#2C2C2C" stroke-width="0.8" opacity="0.2"/>
    <line x1="28" y1="16" x2="34" y2="16" stroke="#2C2C2C" stroke-width="0.8" opacity="0.15"/>
  </g>
  <path d="M140 58 Q126 72 116 84" stroke="#B5654A" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <circle cx="140" cy="58" r="2" fill="#B5654A" opacity="0.4"/>

  <!-- Dashboard node: bottom-right -->
  <g transform="translate(132, 140)">
    <rect width="48" height="36" rx="3" fill="#F5F0E8" stroke="#2C2C2C" stroke-width="1" opacity="0.4"/>
    <!-- Mini bar chart -->
    <rect x="6" y="22" width="6" height="10" rx="1" fill="#B5654A" opacity="0.3"/>
    <rect x="14" y="16" width="6" height="16" rx="1" fill="#B5654A" opacity="0.4"/>
    <rect x="22" y="20" width="6" height="12" rx="1" fill="#B5654A" opacity="0.25"/>
    <rect x="30" y="12" width="6" height="20" rx="1" fill="#2C2C2C" opacity="0.2"/>
    <rect x="38" y="18" width="6" height="14" rx="1" fill="#2C2C2C" opacity="0.15"/>
    <!-- Chart title -->
    <rect x="6" y="6" width="20" height="3" rx="1" fill="#2C2C2C" opacity="0.2"/>
  </g>
  <path d="M136 148 Q122 132 114 118" stroke="#B5654A" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <circle cx="136" cy="148" r="2" fill="#B5654A" opacity="0.4"/>

  <!-- Relation node: bottom-left -->
  <g transform="translate(20, 136)">
    <rect width="44" height="40" rx="3" fill="#F5F0E8" stroke="#2C2C2C" stroke-width="1" opacity="0.4"/>
    <!-- Relation arrows -->
    <circle cx="14" cy="12" r="5" fill="none" stroke="#2C2C2C" stroke-width="0.8" opacity="0.3"/>
    <circle cx="30" cy="12" r="5" fill="none" stroke="#B5654A" stroke-width="0.8" opacity="0.3"/>
    <circle cx="14" cy="28" r="5" fill="none" stroke="#B5654A" stroke-width="0.8" opacity="0.25"/>
    <circle cx="30" cy="28" r="5" fill="none" stroke="#2C2C2C" stroke-width="0.8" opacity="0.25"/>
    <!-- Connecting lines between nodes -->
    <line x1="18" y1="14" x2="26" y2="26" stroke="#B5654A" stroke-width="0.6" opacity="0.3"/>
    <line x1="26" y1="14" x2="18" y2="26" stroke="#2C2C2C" stroke-width="0.6" opacity="0.2"/>
    <line x1="14" y1="17" x2="14" y2="23" stroke="#2C2C2C" stroke-width="0.6" opacity="0.15"/>
    <line x1="30" y1="17" x2="30" y2="23" stroke="#B5654A" stroke-width="0.6" opacity="0.2"/>
  </g>
  <path d="M60 148 Q74 132 86 118" stroke="#B5654A" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <circle cx="60" cy="148" r="2" fill="#B5654A" opacity="0.4"/>

  <!-- Orbit ring -->
  <circle cx="100" cy="100" r="56" fill="none" stroke="#B5654A" stroke-width="0.5" opacity="0.12" stroke-dasharray="2 6"/>

  <!-- Label -->
  <text x="16" y="24" font-family="Georgia, serif" font-size="11" fill="#2C2C2C" opacity="0.5" letter-spacing="0.08em">SYSTEMS</text>
  <line x1="16" y1="30" x2="66" y2="30" stroke="#B5654A" stroke-width="0.8" opacity="0.3"/>
</svg>